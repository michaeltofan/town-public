name: Screen 01 visual preview

on:
  push:
    branches:
      - cursor/town-web-screen-01-entry-bbf4
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-screen-01
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble Screen 01 site
        run: |
          mkdir -p _site/assets
          cp index.html styles.css script.js _site/
          cp assets/welcome-street.png _site/assets/
          printf '%s\n' 'TOWN Web — Screen 01 visual review only.' > _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
